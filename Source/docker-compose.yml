version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: urban-purifier-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: urbanpurifier
      POSTGRES_PASSWORD: urbanpurifier123
      POSTGRES_DB: urban_purifier
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbanpurifier"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
